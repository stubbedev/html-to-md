name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: cargo build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - run: cargo test --locked

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --locked -- -D warnings

  nix:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - run: nix flake check --print-build-logs

      # Push the built package closure to the self-hosted attic cache on master
      # pushes, so `nix run`/flake consumers pull a prebuilt binary. Best-effort.
      - name: push nix build to attic (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          OUT=$(nix build .#html-to-md --no-link --print-out-paths)
          nix run nixpkgs#attic-client -- login stubbe https://nix.stubbe.dev "$ATTIC_TOKEN"
          for attempt in 1 2 3; do
            if nix run nixpkgs#attic-client -- push stubbe:default $OUT; then
              exit 0
            fi
            echo "::warning::attic push attempt $attempt failed; retrying in $((attempt * 30))s"
            sleep $((attempt * 30))
          done
          echo "::warning::attic push failed after 3 attempts; cache push is best-effort, continuing"
